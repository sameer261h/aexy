services:
  postgres:
    build: ./postgres
    image: aexy-postgres:18-alpine-pgvector
    container_name: aexy-postgres
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aexy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-aexy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aexy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aexy-network

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: aexy-redis
    restart: unless-stopped
    mem_limit: 1g
    cpus: "0.5"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aexy-network

  # S3-compatible object storage for task attachments, recordings,
  # compliance docs, etc. Reached only via the internal docker network;
  # public access is brokered by nginx at /storage/.
  rustfs:
    image: rustfs/rustfs:latest@sha256:fa19210ac4697c79d7ccca1ec9b0eb91aebacc6691991ffb14014bb3c67e6cc3
    container_name: aexy-rustfs
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    environment:
      - RUSTFS_ROOT_USER=${RUSTFS_ROOT_USER:?Set RUSTFS_ROOT_USER in .env.prod}
      - RUSTFS_ROOT_PASSWORD=${RUSTFS_ROOT_PASSWORD:?Set RUSTFS_ROOT_PASSWORD in .env.prod}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"
    expose:
      - "9000"
    networks:
      - aexy-network

  temporal:
    image: temporalio/auto-setup:latest@sha256:9be7b8d98f60d00f4f2ff74731c071a17848d8182bbc8429e314a24c94ea105b
    container_name: aexy-temporal
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.0"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-aexy}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aexy-network

  temporal-ui:
    image: temporalio/ui:latest@sha256:fc47cd8202c98ed868745fd9f2f011585232676d08da621b9a6d7bc4653c17aa
    container_name: aexy-temporal-ui
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
    depends_on:
      - temporal
    networks:
      - aexy-network
    expose:
      - "8080"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aexy-backend
    restart: unless-stopped
    mem_limit: 4g
    cpus: "2.0"
    environment:
      # Core
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aexy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aexy}
      - SCHEMA_CREATE_ALL=false
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env.prod}
      - FRONTEND_URL=${FRONTEND_URL:-https://aexy.io}
      - BACKEND_URL=${BACKEND_URL:-https://server.aexy.io}
      - ENVIRONMENT=production
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_FALLBACK_MODELS=${DEEPSEEK_FALLBACK_MODELS:-deepseek-reasoner}
      # GitHub
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_INSTALL_URL=${GITHUB_APP_INSTALL_URL}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_AUTH_REDIRECT_URI=${GOOGLE_AUTH_REDIRECT_URI}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # Microsoft OAuth / Graph
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_AUTH_REDIRECT_URI=${MICROSOFT_AUTH_REDIRECT_URI:-https://server.aexy.io/api/v1/auth/microsoft/callback}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-https://server.aexy.io/api/v1/booking/calendars/callback/microsoft}
      # Slack
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # Email Configuration
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-ses}
      - EMAIL_NOTIFICATIONS_ENABLED=${EMAIL_NOTIFICATIONS_ENABLED:-true}
      # AWS SES (Email)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL:-noreply@aexy.io}
      - SES_SENDER_NAME=${SES_SENDER_NAME:-Aexy}
      # Postmark (Email)
      - POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN}
      - POSTMARK_ACCOUNT_TOKEN=${POSTMARK_ACCOUNT_TOKEN}
      - POSTMARK_SENDER_EMAIL=${POSTMARK_SENDER_EMAIL}
      - POSTMARK_SENDER_NAME=${POSTMARK_SENDER_NAME:-Aexy}
      - POSTMARK_TRANSACTIONAL_STREAM=${POSTMARK_TRANSACTIONAL_STREAM:-outbound}
      - POSTMARK_BROADCAST_STREAM=${POSTMARK_BROADCAST_STREAM:-broadcast}
      # SMTP (Email)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-Aexy}
      # Twilio (SMS)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      # Mailagent internal service
      - MAILAGENT_URL=http://mailagent:8001
      - MAILAGENT_SIGNING_SECRET=${MAILAGENT_INTERNAL_SECRET:?Set MAILAGENT_INTERNAL_SECRET in .env.prod}
      # Platform
      - PLATFORM_ORG_ID=${PLATFORM_ORG_ID:-}
      # Object storage (RustFS, internal)
      - S3_ENDPOINT_URL=http://rustfs:9000
      - S3_ACCESS_KEY_ID=${RUSTFS_ROOT_USER}
      - S3_SECRET_ACCESS_KEY=${RUSTFS_ROOT_PASSWORD}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-aexy-storage}
      - S3_REGION=${S3_REGION:-us-east-1}
      # Public URL the browser uses to fetch uploaded files; nginx proxies
      # /storage/ to rustfs:9000. Set this to your public origin.
      - S3_PUBLIC_ENDPOINT_URL=${S3_PUBLIC_ENDPOINT_URL:-https://server.aexy.io/storage}

      - STRIPE_PRO_PRODUCT_ID=${STRIPE_PRO_PRODUCT_ID}
      - STRIPE_PRO_MONTHLY_PRICE_ID=${STRIPE_PRO_MONTHLY_PRICE_ID}
      - STRIPE_PRO_YEARLY_PRICE_ID=${STRIPE_PRO_YEARLY_PRICE_ID}

      - STRIPE_ENTERPRISE_PRODUCT_ID=${STRIPE_ENTERPRISE_PRODUCT_ID}
      - STRIPE_ENTERPRISE_MONTHLY_PRICE_ID=${STRIPE_ENTERPRISE_MONTHLY_PRICE_ID}
      - STRIPE_ENTERPRISE_YEARLY_PRICE_ID=${STRIPE_ENTERPRISE_YEARLY_PRICE_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      temporal:
        condition: service_started
    command: uvicorn aexy.main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers --forwarded-allow-ips=*
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/ready', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aexy-network
    expose:
      - "8000"

  temporal-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aexy-temporal-worker
    restart: unless-stopped
    mem_limit: 3g
    cpus: "2.0"
    environment:
      # Core
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aexy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aexy}
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://aexy.io}
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.0-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_FALLBACK_MODELS=${DEEPSEEK_FALLBACK_MODELS:-deepseek-reasoner}
      # GitHub
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_AUTH_REDIRECT_URI=${GOOGLE_AUTH_REDIRECT_URI}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # Microsoft OAuth / Graph
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_AUTH_REDIRECT_URI=${MICROSOFT_AUTH_REDIRECT_URI:-https://server.aexy.io/api/v1/auth/microsoft/callback}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-https://server.aexy.io/api/v1/booking/calendars/callback/microsoft}
      # Slack
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # Email Configuration
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-ses}
      - EMAIL_NOTIFICATIONS_ENABLED=${EMAIL_NOTIFICATIONS_ENABLED:-true}
      # AWS SES (Email)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL:-noreply@aexy.io}
      - SES_SENDER_NAME=${SES_SENDER_NAME:-Aexy}
      # Postmark (Email)
      - POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN}
      - POSTMARK_ACCOUNT_TOKEN=${POSTMARK_ACCOUNT_TOKEN}
      - POSTMARK_SENDER_EMAIL=${POSTMARK_SENDER_EMAIL}
      - POSTMARK_SENDER_NAME=${POSTMARK_SENDER_NAME:-Aexy}
      - POSTMARK_TRANSACTIONAL_STREAM=${POSTMARK_TRANSACTIONAL_STREAM:-outbound}
      - POSTMARK_BROADCAST_STREAM=${POSTMARK_BROADCAST_STREAM:-broadcast}
      # SMTP (Email)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-Aexy}
      # Twilio (SMS)
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      # Mailagent internal service
      - MAILAGENT_URL=http://mailagent:8001
      - MAILAGENT_SIGNING_SECRET=${MAILAGENT_INTERNAL_SECRET:?Set MAILAGENT_INTERNAL_SECRET in .env.prod}
      # Platform
      - PLATFORM_ORG_ID=${PLATFORM_ORG_ID:-}
      # Object storage (RustFS, internal)
      - S3_ENDPOINT_URL=http://rustfs:9000
      - S3_ACCESS_KEY_ID=${RUSTFS_ROOT_USER}
      - S3_SECRET_ACCESS_KEY=${RUSTFS_ROOT_PASSWORD}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-aexy-storage}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_PUBLIC_ENDPOINT_URL=${S3_PUBLIC_ENDPOINT_URL:-https://server.aexy.io/storage}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      temporal:
        condition: service_started
    command: python -m aexy.temporal.worker
    healthcheck:
      test: ["CMD", "python", "-c", "import socket, sys; s=socket.create_connection(('temporal', 7233), 5); s.close(); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aexy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_STRIPE_ENABLED=${NEXT_PUBLIC_STRIPE_ENABLED:-false}
    container_name: aexy-frontend
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.0"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_STRIPE_ENABLED=${NEXT_PUBLIC_STRIPE_ENABLED:-false}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aexy-network
    expose:
      - "3000"

  mailagent:
    build:
      context: ./mailagent
      dockerfile: Dockerfile
    container_name: aexy-mailagent
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aexy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aexy}
      - SCHEMA_CREATE_ALL=false
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
      - ENVIRONMENT=production
      - BACKEND_URL=http://backend:8000
      - INTERNAL_SECRET=${MAILAGENT_INTERNAL_SECRET:?Set MAILAGENT_INTERNAL_SECRET in .env.prod}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aexy-network
    expose:
      - "8001"

  # Backup service - runs daily at 2 AM
  backup:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    container_name: aexy-backup
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    environment:
      - PGUSER=${POSTGRES_USER:-aexy}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB:-aexy}
      - PGHOST=postgres
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup_data:/backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting backup scheduler..."
        mkdir -p /backup/dumps
        while true; do
          current_hour=$$(date +%H)
          if [ "$$current_hour" = "02" ]; then
            echo "Running backup at $$(date)"
            TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
            pg_dump | gzip > /backup/dumps/$${PGDATABASE}_$${TIMESTAMP}.sql.gz
            echo "Backup complete. Cleaning old backups..."
            find /backup/dumps -name "*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS} -delete
            ls -lh /backup/dumps/
            sleep 3600
          fi
          sleep 1800
        done
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aexy-network

volumes:
  postgres_data:
  redis_data:
  backup_data:
  rustfs_data:
  rustfs_logs:

networks:
  aexy-network:
    driver: bridge
