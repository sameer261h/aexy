name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run tests (excludes local_llm-marked AI suite)
        # test_tracker_admin.py fails to collect on main already (ImportError
        # for names that don't exist in aexy.api.tracker_admin) -- pre-existing,
        # unrelated to this PR chain. Excluded pending a separate fix.
        run: pytest -m "not local_llm" --ignore=tests/unit/test_tracker_admin.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # next.config.js sets ignoreBuildErrors: true -- this codebase has
      # never held a clean `tsc --noEmit` bar (pre-existing errors in
      # unrelated files: agents wizard, NotionSidebar). Not gating CI on
      # a stricter standard than the project itself uses; vitest is the
      # real correctness gate.
      - name: Unit tests
        run: npx vitest run
