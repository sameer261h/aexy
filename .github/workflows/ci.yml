name: CI

on:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Run pytest
        working-directory: backend
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run pytest -q \
            --ignore=tests/unit/test_tracker_admin.py \
            --ignore=tests/unit/test_microsoft_auth.py \
            --ignore=tests/unit/test_oauth_token_service.py \
            --ignore=tests/integration/test_exports_api.py \
            --deselect tests/integration/test_analytics_api.py::TestAnalyticsAPI::test_get_productivity_trends \
            --deselect tests/integration/test_analytics_api.py::TestAnalyticsAPI::test_get_productivity_trends_with_grouping \
            --deselect tests/integration/test_analytics_api.py::TestAnalyticsAPIValidation::test_productivity_end_before_start \
            --deselect tests/integration/test_developer_insights_api.py::TestE2ESmokeTests::test_full_flow \
            --ignore=tests/integration/test_slack_api.py

  frontend:
    name: Frontend (vitest, tsc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npx vitest run

      - name: Type check
        working-directory: frontend
        # Matches next.config.js's ignoreBuildErrors: type errors are surfaced
        # here for visibility but don't fail the build, consistent with how
        # the project already treats them. A handful of pre-existing errors
        # exist on main unrelated to any single PR.
        continue-on-error: true
        run: npx tsc --noEmit
